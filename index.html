<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Verificador de Mediciones</title>
<style>
:root{--bg:#000000;--card:#1a1a1a;--muted:#b0b0b0;--text:#ffffff;--accent:#00a9e0;--success:#00c853;--danger:#ff4444;--warning:#ffaa00;}
*{box-sizing:border-box;}body{margin:0;padding:24px;background:var(--bg);color:var(--text);font-family:ui-sans-serif;}
h1{margin:0 0 16px;font-size:24px;}h2{margin:0 0 12px;font-size:20px;}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid #333;border-radius:8px;padding:14px;text-align:center;}
.stat-number{font-size:28px;font-weight:bold;margin:6px 0;}
.stat-label{color:var(--muted);font-size:13px;}
.tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:2px solid #333333;}
.tab{background:none;border:none;color:var(--muted);padding:12px 20px;cursor:pointer;font-size:16px;font-weight:600;}
.tab.active{color:var(--text);border-bottom:3px solid var(--accent);}
.tab-content{display:none;}.tab-content.active{display:block;}
.card{background:var(--card);border:1px solid #333333;border-radius:10px;padding:16px;margin-bottom:16px;}
.foto-viewer{display:grid;grid-template-columns:1fr;gap:12px;}
.foto-main{width:100%;max-height:500px;object-fit:contain;border-radius:8px;background:#0d0d0d;cursor:zoom-in;}
.foto-thumbs{display:flex;gap:8px;}
.thumb{height:80px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.thumb.selected{border-color:var(--accent);}
button{background:var(--accent);color:#ffffff;border:none;border-radius:8px;padding:10px 16px;cursor:pointer;}
button.success{background:var(--success);}button.danger{background:var(--danger);}
input[type=text],input[type=date],textarea{background:var(--card);border:1px solid #444444;color:var(--text);padding:10px;border-radius:8px;width:100%;}
.form-group{margin:12px 0;}.form-group label{display:block;margin-bottom:4px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>
<div id="app">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
<h1>Verificador de Mediciones</h1>
<button onclick="refrescar()">🔄 Refrescar</button>
</div>

<div class="dashboard">
<div class="stat-card"><div class="stat-label">Total Mediciones</div><div class="stat-number" id="globalTotal">0</div></div>
<div class="stat-card"><div class="stat-label">Pendientes Revisión</div><div class="stat-number" style="color:var(--warning);" id="globalPendientes">0</div></div>
<div class="stat-card"><div class="stat-label">Aprobados</div><div class="stat-number" style="color:var(--success);" id="globalAprobados">0</div></div>
</div>

<div class="tabs">
<button class="tab active" data-tab="pendientes">Pendientes de Revisión</button>
<button class="tab" data-tab="revisados">Revisados</button>
</div>
<div id="pendientes" class="tab-content active"></div>
<div id="revisados" class="tab-content">
<div class="card">
<h2>Exportar Revisión</h2>
<div style="display:grid;grid-template-columns:1fr 1fr auto auto;gap:8px;">
<div class="form-group"><label>Desde:</label><input id="exportFrom" type="date"/></div>
<div class="form-group"><label>Hasta:</label><input id="exportTo" type="date"/></div>
<button class="success" onclick="exportarRevision()">📦 ZIP + CSV</button>
</div>
</div>
<div id="revisadosList"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxzC032PfHIuToqZav0S4TEY9Sm0vECzeGKooKPHj07Ime4JFHj1HgD6abEu3HVHC15UA/exec';
const firebaseConfig={apiKey:"AIzaSyCh8gYPHnQeYC3_SPV8QNctWVFAqYLMQeU",authDomain:"medicionesodn.firebaseapp.com",projectId:"medicionesodn",appId:"1:650664889209:web:193469c06809de2f653da8"};
firebase.initializeApp(firebaseConfig);
const fbAuth=firebase.auth();
const fbDb=firebase.firestore();

fbAuth.signInAnonymously();

window.refrescar=function(){renderPendientes();renderRevisados();}

let mediciones=[];
fbAuth.onAuthStateChanged(user=>{
if(user){
fbDb.collection('mediciones').onSnapshot(snap=>{
mediciones=snap.docs.map(d=>({id:d.id,...d.data()}));
document.getElementById('globalTotal').textContent=mediciones.length;
document.getElementById('globalPendientes').textContent=mediciones.filter(m=>m.estado==='pendiente_revision').length;
document.getElementById('globalAprobados').textContent=mediciones.filter(m=>m.estado==='medido').length;
renderPendientes();
renderRevisados();
});
}
});

function init(){
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',e=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');document.getElementById(e.target.dataset.tab).classList.add('active');}));
}

function validarMedicion(valor, clasificacion = '') {
	if (!valor || valor.trim() === '') return { valido: false, mensaje: 'Debe ingresar un valor de medición' };
	const esNAP = clasificacion && clasificacion.toUpperCase().includes('NAP');
	const regex = /^-?([0-9]{1,2})\.([0-9]{2})$/;
	if (!regex.test(valor)) return { valido: false, mensaje: `Formato inválido. (ej: ${esNAP ? '-2.45' : '-22.45'})` };
	const num = parseFloat(valor);
	const minValor = esNAP ? -3.5 : -23.5;
	if (num < minValor || num > 5.0) return { valido: false, mensaje: `Valor fuera de rango` };
	return { valido: true, valor: valor };
}

function renderPendientes(){
const pend=mediciones.filter(m=>m.estado==='pendiente_revision');
const el=document.getElementById('pendientes');el.innerHTML='';
if(!pend.length){el.innerHTML='<div class="card">No hay mediciones pendientes.</div>';return;}
pend.forEach(m=>el.appendChild(buildCard(m,true)));
}

function renderRevisados(){
const rev=mediciones.filter(m=>m.estado==='medido');
const el=document.getElementById('revisadosList');el.innerHTML='';
if(!rev.length){el.innerHTML='<div class="card">No hay mediciones revisadas.</div>';return;}
rev.forEach(m=>el.appendChild(buildCard(m,false)));
}

function buildCard(m,isPendiente){
const card=document.createElement('div');card.className='card';
const safeId=m.id.replace(/:/g,'-').replace(/\./g,'-');
let urls=(m.fotos_uris||'').split(';').filter(Boolean);

card.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;">
<div>
<h2 style="margin:0 0 8px 0;">${m.activo||'Sin Activo'} <small style="color:var(--muted);">(${m.proveedor||''})</small></h2>
</div>
<button onclick="toggleDetalle('${safeId}','${m.id}')" style="background:var(--accent);">👁️ Ver</button>
</div>
<div id="detalle-${safeId}" style="display:none;margin-top:16px;border-top:1px solid #333;padding-top:16px;">
${urls.length ? `<img src="${urls[0]}" style="max-width:100%;border-radius:8px;"/>` : ''}
<div class="form-group">
<label>Valor de medición:</label>
<input id="valor-${m.id}" type="text" value="${m.valor_medicion||''}" ${!isPendiente?'readonly':''} />
</div>
${isPendiente?`
<div class="form-group"><label>Comentario de revisión:</label><textarea id="comentario-${m.id}"></textarea></div>
<div style="display:flex;gap:8px;">
<button class="success" onclick="aprobar('${m.id}')">✅ OK</button>
<button class="danger" onclick="rechazar('${m.id}')">❌ Rechazar</button>
</div>`:''}
</div>
`;
return card;
}

window.toggleDetalle=function(safeId,originalId){
const detalle=document.getElementById('detalle-'+safeId);
detalle.style.display=detalle.style.display==='none'?'block':'none';
}

window.aprobar=async function(id){
const valor=document.getElementById('valor-'+id)?.value.trim();
const m=mediciones.find(x=>x.id===id);
const validacion = validarMedicion(valor, m.clasificacion);
if (!validacion.valido) { alert(validacion.mensaje); return; }
await fbDb.collection('mediciones').doc(id).update({estado:'medido',valor_medicion:valor});
}

window.rechazar=async function(id){
const comentario=document.getElementById('comentario-'+id)?.value.trim();
if(!comentario){alert('Debes ingresar un comentario.');return;}
await fbDb.collection('mediciones').doc(id).update({estado:'pendiente',observacion_rechazo:comentario,fotos_uris:'',fotos_cantidad:0});
}

window.exportarRevision=async function(){
const btnExport=document.querySelector('button[onclick="exportarRevision()"]');
btnExport.textContent='⏳ Descargando...';
const zip=new JSZip();
const csvRows=[['Proveedor','Activo','Valor']];
const rev=mediciones.filter(m=>m.estado==='medido');

for(const m of rev){
csvRows.push([m.proveedor||'',m.activo||'',m.valor_medicion||'']);
const urls=(m.fotos_uris||'').split(';').filter(Boolean);
for(let i=0;i<urls.length;i++){
let fileId=urls[i].includes('id=') ? urls[i].match(/id=([^&]+)/)[1] : null;
if(fileId){
const formData=new FormData();
formData.append('action','downloadFile');formData.append('fileId',fileId);
const resp=await fetch(WEBAPP_URL,{method:'POST',body:formData});
const result=await resp.json();
if(result.success){
const blob=new Blob([new Uint8Array(atob(result.base64Data).split("").map(c=>c.charCodeAt(0)))]);
zip.file(`${m.activo}_${m.valor_medicion}.jpg`, blob);
}
}
}
}
zip.file('mediciones.csv',csvRows.map(r=>r.join(',')).join('\n'));
const content=await zip.generateAsync({type:'blob'});
saveAs(content,`revision.zip`);
btnExport.textContent='📦 ZIP + CSV';
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
